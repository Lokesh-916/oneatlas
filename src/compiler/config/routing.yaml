# routing.yaml — OneAtlas AppSpec Engine Provider Routing Config
# Maps each pipeline stage to a tier. Tier defines primary and fallback models.

providers:
  groq:
    api_key_env: GROQ_API_KEY
  gemini:
    api_key_env: GEMINI_API_KEY
  openrouter:
    api_key_env: OPENROUTER_API_KEY

openrouter_equivalents:
  "groq/llama-3.3-70b-versatile": "openrouter/meta-llama/llama-3.3-70b-instruct"
  "gemini/gemini-3.1-flash-lite": "openrouter/meta-llama/llama-3.3-70b-instruct"
  "gemini/gemini-1.5-pro": "openrouter/google/gemini-1.5-pro"

tiers:
  fast_cheap:
    primary: "groq/llama-3.3-70b-versatile"
    fallback: "openrouter/meta-llama/llama-3.3-70b-instruct"
  capable:
    primary: "gemini/gemini-3.1-flash-lite"
    fallback: "openrouter/meta-llama/llama-3.3-70b-instruct"

stages:
  intent_extraction:
    tier: "fast_cheap"
    temperature: 0.1

  architecture_design:
    tier: "capable"
    temperature: 0.2

  db_schema:
    tier: "capable"
    temperature: 0.2

  api_schema:
    tier: "capable"
    temperature: 0.2

  ui_schema:
    tier: "capable"
    temperature: 0.2

  auth_schema:
    tier: "capable"
    temperature: 0.2

  validation:
    tier: "fast_cheap"
    temperature: 0.1

  repair:
    # Repair dynamically routes to the failing model first.
    # It escalates to this tier if the failing model fails again.
    tier: "capable"
    temperature: 0.2

  workflow_stubs:
    tier: "capable"
    temperature: 0.2

  runtime_validation:
    tier: "fast_cheap"
    temperature: 0.1

  logging:
    tier: "capable"
    temperature: 0.3

cost_table:
  "groq/llama-3.3-70b-versatile":
    input: 0.00000059
    output: 0.00000079
  "gemini/gemini-3.1-flash-lite":
    input: 0.00000015
    output: 0.00000060
  "openrouter/meta-llama/llama-3.3-70b-instruct":
    input: 0.00000060
    output: 0.00000080
  "openrouter/google/gemini-1.5-pro":
    input: 0.00000350
    output: 0.00001050