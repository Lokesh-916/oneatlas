# routing.yaml — OneAtlas AppSpec Engine Provider Routing Config
# Maps each pipeline stage to a tier. Tier defines primary and fallback models.

providers:
  groq:
    api_key_env: GROQ_API_KEY
  gemini:
    api_key_env: GEMINI_API_KEY
  openrouter:
    api_key_env: OPENROUTER_API_KEY

openrouter_equivalents:
  "groq/llama-3.3-70b-versatile": "openrouter/meta-llama/llama-3.3-70b-instruct"
  "google/gemini-3.1-flash-lite": "openrouter/meta-llama/llama-3.3-70b-instruct"
  "google/gemini-1.5-pro": "openrouter/google/gemini-1.5-pro"
  "openrouter/deepseek/deepseek-v4-flash": "openrouter/meta-llama/llama-3.3-70b-instruct"
  "openrouter/qwen/qwen3-next-80b-a3b-instruct:free": "openrouter/meta-llama/llama-3.3-70b-instruct"

tiers:
  groq_tier:
    primary: "groq/llama-3.3-70b-versatile"
    fallback: "openrouter/meta-llama/llama-3.3-70b-instruct"
  gemini_tier:
    primary: "google/gemini-3.1-flash-lite"
    fallback: "openrouter/meta-llama/llama-3.3-70b-instruct"
  deepseek_tier:
    primary: "openrouter/deepseek/deepseek-v4-flash"
    fallback: "groq/llama-3.3-70b-versatile"
  qwen_tier:
    primary: "openrouter/qwen/qwen3-next-80b-a3b-instruct:free"
    fallback: "google/gemini-3.1-flash-lite"

stages:
  intent_extraction:
    tier: "groq_tier"
    temperature: 0.1

  architecture_design:
    tier: "deepseek_tier"
    temperature: 0.2

  db_schema:
    tier: "gemini_tier"
    temperature: 0.2

  api_schema:
    tier: "qwen_tier"
    temperature: 0.2

  ui_schema:
    tier: "groq_tier"
    temperature: 0.2

  auth_schema:
    tier: "gemini_tier"
    temperature: 0.2

  validation:
    tier: "groq_tier"
    temperature: 0.1

  repair:
    tier: "deepseek_tier"
    temperature: 0.2

  workflow_stubs:
    tier: "qwen_tier"
    temperature: 0.2

  runtime_validation:
    tier: "groq_tier"
    temperature: 0.1

  logging:
    tier: "gemini_tier"
    temperature: 0.3

cost_table:
  "groq/llama-3.3-70b-versatile":
    input: 0.00000059
    output: 0.00000079
  "google/gemini-3.1-flash-lite":
    input: 0.00000015
    output: 0.00000060
  "openrouter/meta-llama/llama-3.3-70b-instruct":
    input: 0.00000060
    output: 0.00000080
  "openrouter/google/gemini-1.5-pro":
    input: 0.00000350
    output: 0.00001050
  "openrouter/deepseek/deepseek-v4-flash":
    input: 0.00000014
    output: 0.00000028
  "openrouter/qwen/qwen3-next-80b-a3b-instruct:free":
    input: 0.0
    output: 0.0
